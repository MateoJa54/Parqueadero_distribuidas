spring:
  application:
    name: tickets
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:tickets}
    username: ${DB_USER:tickets}
    password: ${DB_PASSWORD:tickets123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    # Ejecuta schema.sql DESPUES de que Hibernate cree las tablas, para poder
    # crear indices unicos parciales y la secuencia de codigos sobre 'tickets'.
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: ${JPA_SHOW_SQL:false}
  sql:
    init:
      mode: always
  # Topes de paginacion: evita que un cliente pida paginas gigantes (DoS de memoria).
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: 8083

# URLs de los microservicios que consume tickets (orquestacion).
services:
  usuarios-url: ${USUARIOS_URL:http://localhost:8081}
  vehiculos-url: ${VEHICULOS_URL:http://localhost:3000}
  zonas-url: ${ZONAS_URL:http://localhost:8080}
  asignaciones-url: ${ASIGNACIONES_URL:http://localhost:8082}

# Mismo secreto/emisor que el microservicio usuarios: permite validar el JWT
# de forma stateless sin llamar a usuarios en cada peticion.
jwt:
  # RS256: este servicio SOLO verifica con la clave PUBLICA (ruta a PEM o PEM en base64).
  public-key: ${JWT_PUBLIC_KEY:keys/jwt_public.pem}
  issuer: ${JWT_ISSUER:parqueadero}

# Tarifas por hora segun (tipo de vehiculo _ tipo de espacio). Los valores se
# leen del archivo .env (spring-dotenv); aqui van solo los valores por defecto.
tarifas:
  por-defecto: ${TARIFA_DEFAULT:1.00}
  matriz:
    AUTO_AUTO: ${TARIFA_AUTO_AUTO:1.50}
    MOTOCICLETA_MOTO: ${TARIFA_MOTOCICLETA_MOTO:0.75}
    CAMIONETA_BUSETA: ${TARIFA_CAMIONETA_BUSETA:2.00}
  # Tarifa diferenciada por ROL del propietario. Factor multiplicador sobre la
  # tarifa base: 1.00 = tarifa plena (visitante externo), <1 = descuento comunidad.
  factor-rol-defecto: ${TARIFA_FACTOR_DEFECTO:1.00}
  factor-rol:
    INVITADO: ${TARIFA_FACTOR_INVITADO:1.00}
    CLIENTE: ${TARIFA_FACTOR_CLIENTE:0.60}
    RECAUDADOR: ${TARIFA_FACTOR_RECAUDADOR:0.50}
    ADMIN: ${TARIFA_FACTOR_ADMIN:0.50}
    ROOT: ${TARIFA_FACTOR_ROOT:0.00}

# Auditoria: publica eventos de CRUD hacia ms-audit via RabbitMQ.
# El exchange se declara "durable" en AuditConfig; ms-audit crea la cola y
# el binding "audit.#" que atrapa cualquier routing key "audit.*".
audit:
  exchange: ${RABBITMQ_EXCHANGE:audit_exchange}
  routing-key: ${RABBITMQ_ROUTING_KEY:audit.event}
