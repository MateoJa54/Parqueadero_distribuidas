spring:
  application:
    name: asignaciones
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:asignaciones}
    username: ${DB_USER:asignaciones}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: ${JPA_SHOW_SQL:false}
  sql:
    init:
      mode: always
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: 8082

services:
  usuarios-url: ${USUARIOS_URL:http://localhost:8081}
  vehiculos-url: ${VEHICULOS_URL:http://localhost:3000}

jwt:
  # RS256: este servicio SOLO verifica con la clave PUBLICA (ruta a PEM o PEM en base64).
  public-key: ${JWT_PUBLIC_KEY:keys/jwt_public.pem}
  issuer: ${JWT_ISSUER:parqueadero}

# Auditoria: publica eventos de CRUD hacia ms-audit via RabbitMQ.
# El exchange se declara "durable" en AuditConfig; ms-audit crea la cola y
# el binding "audit.#" que atrapa cualquier routing key "audit.*".
audit:
  exchange: ${RABBITMQ_EXCHANGE:audit_exchange}
  routing-key: ${RABBITMQ_ROUTING_KEY:audit.event}
