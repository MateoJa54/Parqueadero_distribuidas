
_format_version: "3.0"
_transform: true

services:
  # ---------------- Microservicio USUARIOS ----------------
  - name: usuarios
    url: http://host.docker.internal:8081
    routes:
      - name: usuarios-routes
        strip_path: false
        paths:
          - /api/v1/personas
          - /api/v1/usuarios
          - /api/v1/roles
          - /api/v1/asignaciones
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local

  # ---------------- Microservicio ZONAS -------------------
  - name: zonas
    url: http://host.docker.internal:8080
    routes:
      - name: zonas-routes
        strip_path: false
        paths:
          - /api/v1/zonas
          - /api/v1/espacios
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local

  # ---------------- Microservicio VEHICULOS ---------------
  - name: vehiculos
    url: http://host.docker.internal:3000
    routes:
      - name: vehiculos-routes
        strip_path: false
        paths:
          - /api/vehiculos
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local

  # ---------------- Microservicio ASIGNACIONES ------------
  - name: asignaciones
    url: http://host.docker.internal:8082
    routes:
      - name: asignaciones-routes
        strip_path: false
        paths:
          - /api/v1/asignaciones-vehiculos
          - /api/v1/propietarios
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local

# ---------------- Plugins GLOBALES (a todo el trafico) ----
plugins:
  # CORS: permite que un frontend en otro origen consuma el gateway.
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Content-Type
        - Authorization
      credentials: false
      max_age: 3600


  - name: correlation-id
    config:
      header_name: X-Correlation-ID
      generator: uuid
      echo_downstream: true
