
_format_version: "3.0"
_transform: true

services:
  # ---------------- Microservicio USUARIOS ----------------
  # usuarios es el emisor/validador de JWT y la AUTORIDAD de permisos.
  # Se separan dos tipos de ruta:
  #   - auth  -> PUBLICA  (login/register, un invitado debe poder entrar).
  #   - resto -> PROTEGIDA (el gateway exige un token valido antes de pasar).
  # El control FINO por rol lo hace el propio microservicio con @PreAuthorize.
  - name: usuarios
    url: http://host.docker.internal:8081
    routes:
      # Rutas publicas de autenticacion: SIN plugin jwt.
      - name: usuarios-auth-routes
        strip_path: false
        paths:
          - /api/v1/auth
      # Rutas de gestion: requieren token valido (plugin jwt a nivel de ruta).
      - name: usuarios-protected-routes
        strip_path: false
        paths:
          - /api/v1/personas
          - /api/v1/usuarios
          - /api/v1/roles
          - /api/v1/asignaciones
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local

  # ---------------- Microservicio ZONAS -------------------
  # zonas ahora exige JWT valido en todos sus endpoints (el control fino por
  # rol -ADMIN/ROOT para mutar, RECAUDADOR para cambiar estado- lo hace el
  # propio microservicio con @PreAuthorize).
  - name: zonas
    url: http://host.docker.internal:8080
    routes:
      - name: zonas-routes
        strip_path: false
        paths:
          - /api/v1/zonas
          - /api/v1/espacios
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local

  # ---------------- Microservicio VEHICULOS ---------------
  - name: vehiculos
    url: http://host.docker.internal:3000
    routes:
      - name: vehiculos-routes
        strip_path: false
        paths:
          - /api/vehiculos
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local

  # ---------------- Microservicio ASIGNACIONES ------------
  - name: asignaciones
    url: http://host.docker.internal:8082
    routes:
      - name: asignaciones-routes
        strip_path: false
        paths:
          - /api/v1/asignaciones-vehiculos
          - /api/v1/propietarios
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local

# ---------------- Plugins GLOBALES (a todo el trafico) ----
plugins:
  # CORS: permite que un frontend en otro origen consuma el gateway.
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Content-Type
        - Authorization
      credentials: false
      max_age: 3600


  - name: correlation-id
    config:
      header_name: X-Correlation-ID
      generator: uuid
      echo_downstream: true

# ---------------- Consumidores / credenciales JWT --------
# El plugin jwt valida la firma del token usando este secreto compartido.
# 'key' debe coincidir con el claim 'iss' del token (jwt.issuer en usuarios) y
# 'secret' debe ser identico a JWT_SECRET del microservicio usuarios.
# 'algorithm' debe ser HS512: jjwt (Jwts.builder().signWith(key)) selecciona
# automaticamente el algoritmo HMAC mas fuerte segun el tamano de la clave: con
# el secreto de 66+ caracteres del proyecto, elige HS512 (no HS256 pese a lo
# que dice el comentario original en JwtService). Con HS256 aqui, Kong
# rechazaba TODO token valido con 401 "Invalid algorithm".
# En produccion, sobre-escribir ambos por variables/secretos seguros.
consumers:
  - username: parqueadero-app
    jwt_secrets:
      - key: parqueadero
        algorithm: HS512
        secret: "parqueadero-espe-clave-secreta-jwt-cambia-esto-en-produccion-2026"

