
_format_version: "3.0"
_transform: true

services:
  # ---------------- Microservicio USUARIOS ----------------
  # usuarios es el emisor/validador de JWT y la AUTORIDAD de permisos.
  # Se separan dos tipos de ruta:
  #   - auth  -> PUBLICA  (login/register, un invitado debe poder entrar).
  #   - resto -> PROTEGIDA (el gateway exige un token valido antes de pasar).
  # El control FINO por rol lo hace el propio microservicio con @PreAuthorize.
  - name: usuarios
    url: http://host.docker.internal:8081
    routes:
      # Rutas publicas de autenticacion: SIN plugin jwt.
      - name: usuarios-auth-routes
        strip_path: false
        paths:
          - /api/v1/auth
      # Rutas de gestion: requieren token valido (plugin jwt a nivel de ruta).
      - name: usuarios-protected-routes
        strip_path: false
        paths:
          - /api/v1/personas
          - /api/v1/usuarios
          - /api/v1/roles
          - /api/v1/asignaciones
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local

  # ---------------- Microservicio ZONAS -------------------
  # Todas sus rutas son de gestion -> JWT a nivel de servicio.
  - name: zonas
    url: http://host.docker.internal:8080
    routes:
      - name: zonas-routes
        strip_path: false
        paths:
          - /api/v1/zonas
          - /api/v1/espacios
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
      - name: jwt
        config:
          claims_to_verify:
            - exp

  # ---------------- Microservicio VEHICULOS ---------------
  # Catalogo de vehiculos -> JWT a nivel de servicio.
  - name: vehiculos
    url: http://host.docker.internal:3000
    routes:
      - name: vehiculos-routes
        strip_path: false
        paths:
          - /api/vehiculos
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
      - name: jwt
        config:
          claims_to_verify:
            - exp

  # ---------------- Microservicio ASIGNACIONES ------------
  # Relacion vehiculo<->dueño -> JWT a nivel de servicio.
  - name: asignaciones
    url: http://host.docker.internal:8082
    routes:
      - name: asignaciones-routes
        strip_path: false
        paths:
          - /api/v1/asignaciones-vehiculos
          - /api/v1/propietarios
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
      - name: jwt
        config:
          claims_to_verify:
            - exp

  # ---------------- Microservicio TICKETS (NUCLEO) --------
  # Motor de ingreso/salida/cobro. Antes NO estaba expuesto por Kong.
  # Todas sus rutas exigen JWT (ademas el propio MS valida el token).
  - name: tickets
    url: http://host.docker.internal:8083
    routes:
      - name: tickets-routes
        strip_path: false
        paths:
          - /api/v1/tickets
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
      - name: jwt
        config:
          claims_to_verify:
            - exp

  # ---------------- Microservicio MS-AUDIT -----------------
  # Consulta del trail de auditoria (quien hizo que, desde donde). Contiene
  # datos sensibles (ip, mac, usuario) -> todas sus rutas exigen JWT, igual
  # que tickets. La escritura real llega por RabbitMQ, no por HTTP; el POST
  # queda igual protegido por si se usa para pruebas/reenvios manuales.
  - name: ms-audit
    url: http://host.docker.internal:3002
    routes:
      - name: ms-audit-routes
        strip_path: false
        paths:
          - /api/v1/audit
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
      - name: jwt
        config:
          claims_to_verify:
            - exp

# ---------------- Plugins GLOBALES (a todo el trafico) ----
plugins:
  # CORS: permite que un frontend en otro origen consuma el gateway.
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Content-Type
        - Authorization
      credentials: false
      max_age: 3600


  - name: correlation-id
    config:
      header_name: X-Correlation-ID
      generator: uuid
      echo_downstream: true

# ---------------- Consumidores / credenciales JWT --------
# El plugin jwt valida la firma del token usando este secreto compartido.
# 'key' debe coincidir con el claim 'iss' del token (jwt.issuer en usuarios) y
# 'secret' debe ser identico a JWT_SECRET del microservicio usuarios.
# En produccion, sobre-escribir ambos por variables/secretos seguros.
consumers:
  - username: parqueadero-app
    jwt_secrets:
      # El algoritmo DEBE coincidir con el de firma del microservicio usuarios
      # (JJWT firma en HS512). Si aqui se pone HS256, Kong rechaza todo token
      # con 401 "Invalid algorithm".
      - key: parqueadero
        algorithm: HS512
        secret: "parqueadero-espe-clave-secreta-jwt-cambia-esto-en-produccion-2026"

