
_format_version: "3.0"
_transform: true

services:
  # ---------------- Microservicio USUARIOS ----------------
  # usuarios es el emisor/validador de JWT y la AUTORIDAD de permisos.
  # Se separan dos tipos de ruta:
  #   - auth  -> PUBLICA  (login/register, un invitado debe poder entrar).
  #   - resto -> PROTEGIDA (el gateway exige un token valido antes de pasar).
  # El control FINO por rol lo hace el propio microservicio con @PreAuthorize.
  - name: usuarios
    url: http://host.docker.internal:8081
    routes:
      # Rutas publicas de autenticacion: SIN plugin jwt.
      - name: usuarios-auth-routes
        strip_path: false
        paths:
          - /api/v1/auth
      # Rutas de gestion: requieren token valido (plugin jwt a nivel de ruta).
      - name: usuarios-protected-routes
        strip_path: false
        paths:
          - /api/v1/personas
          - /api/v1/usuarios
          - /api/v1/roles
          - /api/v1/asignaciones
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local

  # ---------------- Microservicio ZONAS -------------------
  # Todas sus rutas son de gestion -> JWT a nivel de servicio.
  - name: zonas
    url: http://host.docker.internal:8080
    routes:
      - name: zonas-routes
        strip_path: false
        paths:
          - /api/v1/zonas
          - /api/v1/espacios
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
      - name: jwt
        config:
          claims_to_verify:
            - exp

  # ---------------- Microservicio VEHICULOS ---------------
  # Catalogo de vehiculos -> JWT a nivel de servicio.
  - name: vehiculos
    url: http://host.docker.internal:3000
    routes:
      - name: vehiculos-routes
        strip_path: false
        paths:
          - /api/vehiculos
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
      - name: jwt
        config:
          claims_to_verify:
            - exp

  # ---------------- Microservicio ASIGNACIONES ------------
  # Relacion vehiculo<->dueño -> JWT a nivel de servicio.
  - name: asignaciones
    url: http://host.docker.internal:8082
    routes:
      - name: asignaciones-routes
        strip_path: false
        paths:
          - /api/v1/asignaciones-vehiculos
          - /api/v1/propietarios
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
      - name: jwt
        config:
          claims_to_verify:
            - exp

  # ---------------- Microservicio TICKETS (NUCLEO) --------
  # Motor de ingreso/salida/cobro. Antes NO estaba expuesto por Kong.
  # Todas sus rutas exigen JWT (ademas el propio MS valida el token).
  - name: tickets
    url: http://host.docker.internal:8083
    routes:
      - name: tickets-routes
        strip_path: false
        paths:
          - /api/v1/tickets
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
      - name: jwt
        config:
          claims_to_verify:
            - exp

  # ---------------- Microservicio MS-AUDIT -----------------
  # Consulta del trail de auditoria (quien hizo que, desde donde). Contiene
  # datos sensibles (ip, mac, usuario) -> todas sus rutas exigen JWT, igual
  # que tickets. La escritura real llega por RabbitMQ, no por HTTP; el POST
  # queda igual protegido por si se usa para pruebas/reenvios manuales.
  - name: ms-audit
    url: http://host.docker.internal:3002
    routes:
      - name: ms-audit-routes
        strip_path: false
        paths:
          - /api/v1/audit
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
      - name: jwt
        config:
          claims_to_verify:
            - exp

# ---------------- Plugins GLOBALES (a todo el trafico) ----
plugins:
  # CORS: permite que un frontend en otro origen consuma el gateway.
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Content-Type
        - Authorization
      credentials: false
      max_age: 3600


  - name: correlation-id
    config:
      header_name: X-Correlation-ID
      generator: uuid
      echo_downstream: true

# ---------------- Consumidores / credenciales JWT --------
# Firma ASIMETRICA RS256: Kong solo necesita la clave PUBLICA para VERIFICAR la
# firma; nunca ve la clave privada. 'key' debe coincidir con el claim 'iss' del
# token (jwt.issuer en usuarios). La clave publica no es secreta: puede vivir en
# el repo sin riesgo, porque sin la clave privada nadie puede re-firmar un token.
# Para rotar las claves: regenerar el par (scripts/setup_jwt_keys.sh) y pegar
# aqui el nuevo contenido de keys/jwt_public.pem.
consumers:
  - username: parqueadero-app
    jwt_secrets:
      # El algoritmo DEBE coincidir con el de firma de usuarios (RS256).
      - key: parqueadero
        algorithm: RS256
        rsa_public_key: |
          -----BEGIN PUBLIC KEY-----
          MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAxJA+rKx/HXfbmO1LQKN4
          yOutD4WOthVlrykPNq6FfE9CC4ReH5eTJIbsnEQFw36FwmYDQ0MsoTIq8JdADWR/
          72eKyTBiJw3JSUOdx2jg5SJN1zUcRJsYPBVs6FSMyiskZ+xUwWjURU+3lAmmYhMn
          25J2YfUML26IFo+eCY7PY+F39dpKUofJjW6XX+/b0fCXwAGWIVjRe4Rf5K5F0Jwp
          2xHwBNlts51wz+DE1s8bs9UVzPYviI0e/+AOfOyJ9UTG74WK//cMsvIJgQIvuQFl
          U9LhcBgB7AeJ9PmsiP7eBkWn1ltU2ZRfpZfqutlOPydDwohV10MV1r3IyAMEAOx6
          /QIDAQAB
          -----END PUBLIC KEY-----

