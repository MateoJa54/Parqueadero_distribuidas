# =====================================================================
# Kong API Gateway - modo DB-less (declarativo)
# ---------------------------------------------------------------------
# Levanta SOLO Kong. Las 3 APIs siguen corriendo en el host
# (mvnw / npm). Kong las alcanza con host.docker.internal.
#
# Uso:
#   cd gateway
#   docker compose up -d
#
# Puertos:
#   8000 -> proxy  (por aqui entran TODAS las peticiones de los clientes)
#   8001 -> admin  (API de administracion / inspeccion de Kong)
#
# Requisito: las APIs deben estar levantadas en el host en
#   usuarios 8081, zonas 8080, vehiculos 3000,
#   asignaciones 8082, tickets 8083, ms-audit 3002.
# =====================================================================
services:
  kong:
    image: kong:3.7
    container_name: parqueadero-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./kong.yml:/kong/kong.yml:ro
    # Necesario en Linux para que el contenedor resuelva host.docker.internal
    # hacia la maquina anfitriona (donde corren las APIs).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
