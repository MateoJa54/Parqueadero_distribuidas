name: SonarCloud - Frontend

# Analiza el frontend (React 18 + Vite + TS). Sin cobertura por ahora: el
# proyecto no tiene tests todavia (hallazgo del sdd-init). Cuando se agreguen
# tests (Vitest/Jest), sumar aqui "npm run test:cov" + sonar.javascript.lcov.reportPaths
# igual que en sonarcloud-nestjs.yml.

on:
  push:
    branches: [proyecto_aseguramiento]
    paths:
      - "frontend/**"
      - ".github/workflows/sonarcloud-frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/sonarcloud-frontend.yml"
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze frontend
    runs-on: ubuntu-latest
    environment: SonarqubeActions
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.projectKey=parqueadero-frontend
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=src
            -Dsonar.exclusions=**/node_modules/**,**/dist/**
