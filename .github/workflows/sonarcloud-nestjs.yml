name: SonarCloud - NestJS services

# Analiza vehiculos y ms-audit (NestJS 11 + TypeORM) con cobertura real de Jest.
#
# Nota: se usa Node 20 (LTS) en el runner en vez de una version mas nueva porque
# el scanner de SonarCloud advierte que versiones de Node fuera de [16,18,20] no
# estan soportadas oficialmente; Node 20 coincide ademas con el minimo del README.

on:
  push:
    branches: [main, proyecto_aseguramiento]
    paths:
      - "vehiculos/**"
      - "ms-audit/**"
      - ".github/workflows/sonarcloud-nestjs.yml"
  pull_request:
    paths:
      - "vehiculos/**"
      - "ms-audit/**"
      - ".github/workflows/sonarcloud-nestjs.yml"
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze ${{ matrix.module }}
    runs-on: ubuntu-latest
    environment: SonarqubeActions
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: vehiculos
            path: vehiculos/vehiculos
            project_key: parqueadero-vehiculos
          - module: ms-audit
            path: ms-audit
            project_key: parqueadero-ms-audit

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Run tests with coverage
        working-directory: ${{ matrix.path }}
        run: npm run test:cov

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ${{ matrix.path }}
          args: >
            -Dsonar.projectKey=${{ matrix.project_key }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=src
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/*.spec.ts
            -Dsonar.tests=src
            -Dsonar.test.inclusions=**/*.spec.ts
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
