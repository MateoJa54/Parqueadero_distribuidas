# ============================================================
# Base de datos UNIFICADA para el sistema de parqueadero.
#
# Una sola instancia PostgreSQL (puerto host 5433) que aloja las
# bases de datos usadas por las APIs:
#   - zonas         (Spring Boot)  usuario: zonas        / zonas123
#   - usuarios      (Spring Boot)  usuario: usuarios     / usuarios123
#   - asignaciones  (Spring Boot)  usuario: asignaciones / asignaciones123
#   - tickets       (Spring Boot)  usuario: tickets      / tickets123
#   - vehiculos_db  (NestJS)       usuario: postgres     / postgres
#   - audit_db      (NestJS, ms-audit) usuario: audit_user / audit_pass
#
# Las bases y usuarios se crean automáticamente con los scripts
# de ./init-db la primera vez que se levanta el volumen.
#
# RabbitMQ (puerto host 5672, panel de administracion 15672) es el
# bus de eventos de auditoria: cada microservicio publica sus eventos
# de CRUD/login en el exchange "audit_exchange" y ms-audit los consume
# y persiste en audit_db.
#
# Uso:
#   docker compose up -d        # levantar
#   docker compose down         # detener (conserva datos)
#   docker compose down -v      # detener y BORRAR datos
# ============================================================
services:
  postgres:
    image: postgres:16
    container_name: parqueadero-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - parqueadero_pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: parqueadero-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"    # AMQP (lo usan todos los microservicios)
      - "15672:15672"  # Panel de administracion: http://localhost:15672
    volumes:
      - parqueadero_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  parqueadero_pgdata:
  parqueadero_rabbitmq_data:
