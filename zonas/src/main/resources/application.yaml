spring:
  application:
    name: zonas
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5433}/zonas
    username: zonas
    password: zonas123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

jwt:
  secret: ${JWT_SECRET:parqueadero-espe-clave-secreta-jwt-cambia-esto-en-produccion-2026}
  issuer: ${JWT_ISSUER:parqueadero}

# Auditoria: publica eventos de CRUD hacia ms-audit via RabbitMQ.
# El exchange se declara "durable" en AuditConfig; ms-audit crea la cola y
# el binding "audit.#" que atrapa cualquier routing key "audit.*".
audit:
  exchange: ${RABBITMQ_EXCHANGE:audit_exchange}
  routing-key: ${RABBITMQ_ROUTING_KEY:audit.event}
