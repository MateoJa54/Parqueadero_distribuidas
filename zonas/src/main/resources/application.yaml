spring:
  application:
    name: zonas
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:zonas}
    username: ${DB_USER:zonas}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: ${JPA_SHOW_SQL:false}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

jwt:
  # RS256: este servicio SOLO verifica con la clave PUBLICA (ruta a PEM o PEM en base64).
  public-key: ${JWT_PUBLIC_KEY:keys/jwt_public.pem}
  issuer: ${JWT_ISSUER:parqueadero}

# Origenes permitidos para el canal SSE publico. En produccion se restringe al
# dominio del dashboard via CORS_ALLOWED_ORIGINS (lista separada por comas).
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Auditoria: publica eventos de CRUD hacia ms-audit via RabbitMQ.
# El exchange se declara "durable" en AuditConfig; ms-audit crea la cola y
# el binding "audit.#" que atrapa cualquier routing key "audit.*".
audit:
  exchange: ${RABBITMQ_EXCHANGE:audit_exchange}
  routing-key: ${RABBITMQ_ROUTING_KEY:audit.event}
