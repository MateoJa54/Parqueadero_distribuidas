# Frontend (React + Vite) servido por Nginx. Las llamadas a la API salen
# hacia el Ingress (/api -> Kong).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: parqueadero-iza-garcia-criollo
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: parqueadero/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: parqueadero-iza-garcia-criollo
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
