# Microservicio zonas: catalogo de zonas y espacios (solo verifica JWT).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zonas
  namespace: parqueadero-iza-garcia-criollo
  labels:
    app: zonas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zonas
  template:
    metadata:
      labels:
        app: zonas
    spec:
      containers:
        - name: zonas
          image: parqueadero/zonas:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "zonas"
            - name: DB_USER
              value: "zonas"
            - name: DB_PASSWORD
              value: "zonas123"
            - name: RABBITMQ_HOST
              value: "rabbitmq"
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USER
              value: "guest"
            - name: RABBITMQ_PASSWORD
              value: "guest"
            - name: JWT_ISSUER
              value: "parqueadero"
            - name: JWT_PUBLIC_KEY
              value: "/keys/jwt_public.pem"
            - name: CORS_ALLOWED_ORIGINS
              value: "http://parqueadero.local,http://localhost:5173"
          volumeMounts:
            - name: jwt-keys
              mountPath: /keys
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 30
      volumes:
        - name: jwt-keys
          secret:
            secretName: jwt-keys
---
apiVersion: v1
kind: Service
metadata:
  name: zonas
  namespace: parqueadero-iza-garcia-criollo
spec:
  selector:
    app: zonas
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
