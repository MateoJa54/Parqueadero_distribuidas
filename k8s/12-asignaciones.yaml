# Microservicio asignaciones: relacion vehiculo<->propietario.
# Consume usuarios y vehiculos por HTTP interno del cluster.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asignaciones
  namespace: parqueadero-iza-garcia-criollo
  labels:
    app: asignaciones
spec:
  replicas: 1
  selector:
    matchLabels:
      app: asignaciones
  template:
    metadata:
      labels:
        app: asignaciones
    spec:
      containers:
        - name: asignaciones
          image: parqueadero/asignaciones:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "asignaciones"
            - name: DB_USER
              value: "asignaciones"
            - name: DB_PASSWORD
              value: "asignaciones123"
            - name: RABBITMQ_HOST
              value: "rabbitmq"
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USER
              value: "guest"
            - name: RABBITMQ_PASSWORD
              value: "guest"
            - name: JWT_ISSUER
              value: "parqueadero"
            - name: JWT_PUBLIC_KEY
              value: "/keys/jwt_public.pem"
            - name: USUARIOS_URL
              value: "http://usuarios:8081"
            - name: VEHICULOS_URL
              value: "http://vehiculos:3000"
          volumeMounts:
            - name: jwt-keys
              mountPath: /keys
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 30
      volumes:
        - name: jwt-keys
          secret:
            secretName: jwt-keys
---
apiVersion: v1
kind: Service
metadata:
  name: asignaciones
  namespace: parqueadero-iza-garcia-criollo
spec:
  selector:
    app: asignaciones
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP
